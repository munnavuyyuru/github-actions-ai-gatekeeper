name: Action-AI-Gatekeeper

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_and_test:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  ai_security_gate:
    runs-on: self-hosted
    needs: build_and_test
    if: github.event_name == 'pull_request'

    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bootstrap Environment Dependencies
        run: |
          echo "Checking and installing environment prerequisites..."
          python3 -m pip install --upgrade pip
          python3 -m pip install openai python-dotenv requests

      - name: Run Gatekeeper Script
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python /opt/security-agent/scan_diff.py
